  <path d="M100 60 Q105 45 100 30" stroke="#00FF41" fill="none" stroke-width="2" opacity="0.6"/>
  <path d="M120 60 Q115 50 120 40" stroke="#00FF41" fill="none" stroke-width="2" opacity="0.6"/>
