<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F7931A;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="200" height="200" fill="#000000"/>
  <!-- Gold Bitcoin symbol -->
  <text x="100" y="120" font-family="serif" font-size="80" fill="url(#goldGrad)" text-anchor="middle" filter="drop-shadow(0 0 8px #F7931A)">₿</text>
  <!-- Text Aureo -->
  <text x="100" y="170" font-family="monospace" font-size="24" fill="#00FF41" text-anchor="middle">AUREO</text>
  <!-- Corner lines -->
  <path d="M20 20 L20 40 L40 20" stroke="#F7931A" fill="none" stroke-width="2"/>
  <path d="M180 20 L180 40 L160 20" stroke="#F7931A" fill="none" stroke-width="2"/>
</svg>