<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="hardwareGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00FF41;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#008F11;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="200" height="200" fill="#000000"/>
  <!-- Server rack outline -->
  <rect x="70" y="40" width="60" height="120" fill="none" stroke="#F7931A" stroke-width="2"/>
  <!-- Server lights -->
  <rect x="80" y="60" width="15" height="8" fill="#00FF41"/>
  <rect x="100" y="60" width="15" height="8" fill="#00FF41"/>
  <rect x="120" y="60" width="15" height="8" fill="#F7931A"/>
  <rect x="80" y="80" width="40" height="6" fill="#333"/>
  <rect x="80" y="95" width="40" height="6" fill="#333"/>
  <rect x="80" y="110" width="40" height="6" fill="#333"/>
  <!-- Lightning bolt -->
  <polygon points="100,150 130,180 105,180 115,230 85,200 95,160" fill="url(#hardwareGrad)"/>
  <!-- Corner brackets -->
  <path d="M30 30 L30 45 L45 30" stroke="#00FF41" fill="none" stroke-width="2"/>
  <path d="M170 30 L170 45 L155 30" stroke="#00FF41" fill="none" stroke-width="2"/>
</svg>