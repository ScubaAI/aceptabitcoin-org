<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="consultGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F7931A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00FF41;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="200" height="200" fill="#000000"/>
  <!-- Briefcase -->
  <g transform="translate(100, 90)" fill="none" stroke="url(#consultGrad)" stroke-width="3">
    <rect x="-40" y="0" width="80" height="50" rx="4"/>
    <rect x="-25" y="-10" width="50" height="10" rx="2"/>
    <line x1="-15" y1="0" x2="-15" y2="50" stroke-width="2"/>
    <line x1="15" y1="0" x2="15" y2="50" stroke-width="2"/>
  </g>
  <!-- B letter -->
  <text x="100" y="185" font-family="serif" font-size="48" fill="#00FF41" text-anchor="middle" font-weight="bold">B</text>
</svg>