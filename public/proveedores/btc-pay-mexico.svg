<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="mexicoGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00FF41;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#CE1126;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="200" height="200" fill="#000000"/>
  <!-- Mexican flag stripes background (thin) -->
  <rect x="0" y="70" width="200" height="30" fill="#CE1126"/>
  <rect x="0" y="85" width="200" height="30" fill="#FFFFFF"/>
  <rect x="0" y="100" width="200" height="30" fill="#00FF41"/>
  <!-- BTC symbol overlay (centered) -->
  <text x="100" y="125" font-family="serif" font-size="64" fill="#F7931A" text-anchor="middle" filter="drop-shadow(0 0 6px #F7931A)">₿</text>
  <!-- BTC Pay text -->
  <text x="100" y="170" font-family="monospace" font-size="16" fill="#FFFFFF" text-anchor="middle" letter-spacing="2">BTC PAY MÉXICO</text>
</svg>