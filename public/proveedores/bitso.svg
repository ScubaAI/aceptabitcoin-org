<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="blueMatrix" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00FF41;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#008F11;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="200" height="200" fill="#000000"/>
  <!-- Circular arrows (exchange symbol) -->
  <g transform="translate(100, 100)" fill="none" stroke="url(#blueMatrix)" stroke-width="5" stroke-linecap="round">
    <path d="M-30 0 A30 30 0 0 1 30 0" />
    <path d="M0 -40 A40 40 0 0 1 70 10" transform="rotate(120)"/>
    <path d="M30 0 A30 30 0 0 1 -30 0" transform="rotate(-180)"/>
    <path d="M0 40 A40 40 0 0 1 -70 -10" transform="rotate(-120)"/>
  </g>
  <!-- B and S letters (Bitso) -->
  <text x="100" y="120" font-family="sans-serif" font-size="24" fill="#FFFFFF" text-anchor="middle" font-weight="bold">B S</text>
  <!-- Corner accents -->
  <path d="M15 15 L15 30 L30 15" stroke="#00FF41" fill="none" stroke-width="2"/>
  <path d="M185 15 L185 30 L170 15" stroke="#00FF41" fill="none" stroke-width="2"/>
</svg>