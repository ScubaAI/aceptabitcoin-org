<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <linearGradient id="hotelGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F7931A;stop-opacity:0.2" />
      <stop offset="50%" style="stop-color:#00FF41;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#F7931A;stop-opacity:0.2" />
    </linearGradient>
  </defs>
  <rect width="1200" height="400" fill="#000000"/>
  <!-- Hotel building silhouette -->
  <g opacity="0.4">
    <rect x="250" y="180" width="200" height="220" fill="#00FF41"/>
    <rect x="500" y="140" width="250" height="260" fill="#F7931A"/>
    <rect x="800" y="200" width="150" height="200" fill="#00FF41"/>
    <!-- Windows grid -->
    <g fill="#000000">
      <rect x="270" y="200" width="40" height="50"/>
      <rect x="330" y="200" width="40" height="50"/>
      <rect x="390" y="200" width="40" height="50"/>
      <rect x="270" y="270" width="40" height="50"/>
      <rect x="330" y="270" width="40" height="50"/>
      <rect x="390" y="270" width="40" height="50"/>
      <rect x="520" y="160" width="50" height="60"/>
      <rect x="590" y="160" width="50" height="60"/>
      <rect x="660" y="160" width="50" height="60"/>
      <rect x="520" y="240" width="50" height="60"/>
      <rect x="590" y="240" width="50" height="60"/>
      <rect x="660" y="240" width="50" height="60"/>
    </g>
  </g>
  <!-- Title -->
  <text x="600" y="130" font-family="serif" font-size="64" font-weight="bold"
        fill="#FFFFFF" text-anchor="middle" filter="url(#hotelGrad)">BOB HOTEL</text>
  <text x="600" y="360" font-family="monospace" font-size="16" fill="#00FF41" text-anchor="middle" letter-spacing="2">
    [ HOTEL MANAGEMENT SOVEREIGN ]
  </text>
  <!-- BTC logos -->
  <circle cx="150" cy="320" r="30" fill="none" stroke="#F7931A" stroke-width="2"/>
  <text x="150" y="327" font-family="serif" font-size="26" fill="#F7931A" text-anchor="middle">₿</text>
  <circle cx="1050" cy="320" r="30" fill="none" stroke="#F7931A" stroke-width="2"/>
  <text x="1050" y="327" font-family="serif" font-size="26" fill="#F7931A" text-anchor="middle">₿</text>
</svg>