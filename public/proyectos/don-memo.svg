<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="matrixGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00FF41;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#008F11;stop-opacity:1" />
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="200" height="200" fill="#000000"/>
  <g opacity="0.08">
    <line x1="20" y1="60" x2="180" y2="60" stroke="#00FF41" stroke-width="1"/>
    <line x1="20" y1="100" x2="180" y2="100" stroke="#00FF41" stroke-width="1"/>
    <line x1="20" y1="140" x2="180" y2="140" stroke="#00FF41" stroke-width="1"/>
  </g>
  <!-- Memo/avatar icon -->
  <circle cx="100" cy="90" r="40" fill="none" stroke="url(#matrixGrad2)" stroke-width="3"/>
  <text x="100" y="98" font-family="serif" font-size="36" fill="#FFFFFF" text-anchor="middle">DM</text>
  <!-- Book/education icon -->
  <rect x="60" y="140" width="80" height="30" rx="4" fill="none" stroke="#F7931A" stroke-width="2"/>
  <line x1="80" y1="148" x2="120" y2="148" stroke="#F7931A" stroke-width="2"/>
  <line x1="80" y1="156" x2="110" y2="156" stroke="#F7931A" stroke-width="2"/>
  <!-- Corner brackets -->
  <path d="M25 25 L25 45 L45 25" stroke="#F7931A" fill="none" stroke-width="2"/>
  <path d="M175 25 L175 45 L155 25" stroke="#F7931A" fill="none" stroke-width="2"/>
</svg>