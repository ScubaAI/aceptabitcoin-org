<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="cosmeticGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00FF41;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#008F11;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="200" height="200" fill="#000000"/>
  <!-- Lipstick shape -->
  <g transform="translate(100, 100)">
    <rect x="-20" y="-50" width="40" height="70" rx="6" fill="none" stroke="url(#cosmeticGrad)" stroke-width="3"/>
    <rect x="-10" y="20" width="20" height="40" rx="3" fill="#F7931A"/>
    <circle cx="0" cy="-30" r="12" fill="#FF1493" opacity="0.8"/>
  </g>
  <!-- BTC symbol overlay -->
  <text x="100" y="120" font-family="serif" font-size="24" fill="#FFFFFF" text-anchor="middle" opacity="0.3">₿</text>
  <!-- Corner brackets -->
  <path d="M35 35 L35 55 L55 35" stroke="#F7931A" fill="none" stroke-width="2"/>
  <path d="M165 35 L165 55 L145 35" stroke="#F7931A" fill="none" stroke-width="2"/>
</svg>