<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="pizzaGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F7931A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF8C00;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="200" height="200" fill="#000000"/>
  <!-- Pizza slice shape -->
  <path d="M100 40 L160 160 L40 160 Z" fill="none" stroke="url(#pizzaGrad)" stroke-width="4"/>
  <!-- Pizza toppings (BTC symbols) -->
  <text x="100" y="110" font-family="serif" font-size="32" fill="#00FF41" text-anchor="middle">₿</text>
  <circle cx="80" cy="100" r="6" fill="#00FF41"/>
  <circle cx="120" cy="105" r="6" fill="#F7931A"/>
  <circle cx="100" cy="140" r="6" fill="#00FF41"/>
  <!-- Cheese drip -->
  <path d="M60 160 Q70 180 80 160" stroke="#F7931A" fill="none" stroke-width="3"/>
  <path d="M100 165 Q110 185 120 165" stroke="#F7931A" fill="none" stroke-width="3"/>
  <path d="M140 160 Q150 180 160 160" stroke="#F7931A" fill="none" stroke-width="3"/>
  <!-- Corner accents -->
  <path d="M30 30 L30 50 L50 30" stroke="#00FF41" fill="none" stroke-width="2"/>
  <path d="M170 30 L170 50 L150 30" stroke="#00FF41" fill="none" stroke-width="2"/>
</svg>