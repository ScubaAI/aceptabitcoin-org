<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <linearGradient id="btcGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F7931A;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#F7931A;stop-opacity:0.1" />
    </linearGradient>
    <filter id="blurGlow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1200" height="400" fill="#000000"/>
  <!-- Matrix grid lines -->
  <g opacity="0.06" stroke="#00FF41" stroke-width="0.5">
    <line x1="100" y1="0" x2="100" y2="400"/>
    <line x1="300" y1="0" x2="300" y2="400"/>
    <line x1="500" y1="0" x2="500" y2="400"/>
    <line x1="700" y1="0" x2="700" y2="400"/>
    <line x1="900" y1="0" x2="900" y2="400"/>
    <line x1="1100" y1="0" x2="1100" y2="400"/>
  </g>
  <!-- Central title -->
  <text x="600" y="180" font-family="serif" font-size="80" font-weight="bold"
        fill="#FFFFFF" text-anchor="middle" filter="url(#blurGlow)">PIZZA SATS</text>
  <text x="600" y="240" font-family="monospace" font-size="20" fill="#F7931A" text-anchor="middle" letter-spacing="8">
    LIGHTNING • P2P • SOBERANO
  </text>
  <!-- Pizza icons (simplified) -->
  <g transform="translate(200, 300)">
    <circle cx="0" cy="0" r="40" fill="none" stroke="#00FF41" stroke-width="2"/>
    <circle cx="0" cy="0" r="25" fill="#F7931A" opacity="0.4"/>
    <circle cx="-15" cy="-10" r="6" fill="#00FF41"/>
    <circle cx="15" cy="5" r="6" fill="#00FF41"/>
  </g>
  <g transform="translate(600, 300)">
    <circle cx="0" cy="0" r="40" fill="none" stroke="#00FF41" stroke-width="2"/>
    <circle cx="0" cy="0" r="25" fill="#F7931A" opacity="0.4"/>
    <circle cx="-15" cy="-10" r="6" fill="#00FF41"/>
    <circle cx="15" cy="5" r="6" fill="#00FF41"/>
  </g>
  <g transform="translate(1000, 300)">
    <circle cx="0" cy="0" r="40" fill="none" stroke="#00FF41" stroke-width="2"/>
    <circle cx="0" cy="0" r="25" fill="#F7931A" opacity="0.4"/>
    <circle cx="-15" cy="-10" r="6" fill="#00FF41"/>
    <circle cx="15" cy="5" r="6" fill="#00FF41"/>
  </g>
</svg>