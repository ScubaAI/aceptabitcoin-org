<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="matrixGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00FF41;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#008F11;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="200" height="200" fill="#000000"/>
  <!-- Grid pattern -->
  <g opacity="0.1">
    <line x1="0" y1="40" x2="200" y2="40" stroke="#00FF41" stroke-width="0.5"/>
    <line x1="0" y1="80" x2="200" y2="80" stroke="#00FF41" stroke-width="0.5"/>
    <line x1="0" y1="120" x2="200" y2="120" stroke="#00FF41" stroke-width="0.5"/>
    <line x1="0" y1="160" x2="200" y2="160" stroke="#00FF41" stroke-width="0.5"/>
    <line x1="40" y1="0" x2="40" y2="200" stroke="#00FF41" stroke-width="0.5"/>
    <line x1="80" y1="0" x2="80" y2="200" stroke="#00FF41" stroke-width="0.5"/>
    <line x1="120" y1="0" x2="120" y2="200" stroke="#00FF41" stroke-width="0.5"/>
    <line x1="160" y1="0" x2="160" y2="200" stroke="#00FF41" stroke-width="0.5"/>
  </g>
  <!-- BOB letters -->
  <text x="100" y="115" font-family="monospace" font-size="64" font-weight="bold"
        fill="url(#matrixGlow)" text-anchor="middle" filter="url(#glow)">BOB</text>
  <!-- Corner brackets -->
  <path d="M30 30 L30 50 L50 30" stroke="#F7931A" fill="none" stroke-width="2"/>
  <path d="M170 30 L170 50 L150 30" stroke="#F7931A" fill="none" stroke-width="2"/>
  <path d="M30 170 L30 150 L50 170" stroke="#F7931A" fill="none" stroke-width="2"/>
  <path d="M170 170 L170 150 L150 170" stroke="#F7931A" fill="none" stroke-width="2"/>
</svg>