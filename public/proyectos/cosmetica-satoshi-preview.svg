<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <linearGradient id="femGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00FF41;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0" />
    </linearGradient>
  </defs>
  <rect width="1200" height="400" fill="#000000"/>
  <!-- Decorative circles (bokeh) -->
  <circle cx="200" cy="200" r="80" fill="none" stroke="#F7931A" stroke-width="1" opacity="0.2"/>
  <circle cx="600" cy="200" r="100" fill="none" stroke="#00FF41" stroke-width="1" opacity="0.2"/>
  <circle cx="1000" cy="200" r="90" fill="none" stroke="#F7931A" stroke-width="1" opacity="0.2"/>
  <!-- Main title -->
  <text x="600" y="160" font-family="serif" font-size="72" font-weight="bold"
        fill="#FFFFFF" text-anchor="middle" filter="url(#femGrad)">COSMÉTICA SATOSHI</text>
  <text x="600" y="220" font-family="monospace" font-size="18" fill="#00FF41" text-anchor="middle" letter-spacing="6">
    SOBERANÍA • BELLEZA • BITCOIN
  </text>
  <!-- Product icons (lipstick, powder) -->
  <g transform="translate(350, 260)">
    <rect x="0" y="0" width="60" height="100" rx="8" fill="none" stroke="#F7931A" stroke-width="3"/>
    <rect x="10" y="20" width="40" height="60" rx="4" fill="#FF1493" opacity="0.7"/>
  </g>
  <g transform="translate(500, 280)">
    <circle cx="30" cy="30" r="30" fill="none" stroke="#00FF41" stroke-width="3"/>
    <circle cx="30" cy="30" r="20" fill="#F7931A" opacity="0.5"/>
  </g>
  <g transform="translate(700, 280)">
    <rect x="0" y="0" width="50" height="70" rx="5" fill="none" stroke="#F7931A" stroke-width="3"/>
    <rect x="8" y="10" width="34" height="50" rx="3" fill="#00FF41" opacity="0.5"/>
  </g>
  <g transform="translate(850, 260)">
    <polygon points="30,0 60,50 0,50" fill="none" stroke="#00FF41" stroke-width="3"/>
    <polygon points="30,15 50,50 10,50" fill="#F7931A" opacity="0.6"/>
  </g>
</svg>